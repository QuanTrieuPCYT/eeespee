esphome:
  name: led-light
  friendly_name: LED Light

esp32:
  variant: esp32
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

light:
  - platform: status_led
    name: LED Indicator
    pin:
      number: GPIO2

  - platform: esp32_rmt_led_strip
    name: LED Light
    pin: GPIO27
    num_leds: 60
    chipset: SK6812
    is_wrgb: true
    rgb_order: RGB
    gamma_correct: 0.8
    default_transition_length: 0.45s
    effects:
      - pulse:
      - random:
      - strobe:
      - flicker:
      - addressable_color_wipe:
      - addressable_fireworks:
      - addressable_flicker:
      - addressable_rainbow:
      - addressable_random_twinkle:
      - addressable_scan:
      - addressable_twinkle:
    restore_mode: RESTORE_DEFAULT_OFF
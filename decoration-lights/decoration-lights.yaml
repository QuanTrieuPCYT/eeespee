esphome:
  name: decoration-lights
  friendly_name: Decoration Lights

bk72xx:
  board: cb2s

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

output:
  - platform: gpio
    pin: P24
    id: relay

light:
  - platform: binary
    id: decoration_lights
    name: Decoration Lights
    output: relay

  - platform: status_led
    name: LED Indicator
    pin:
      number: GPIO7
      inverted: true

binary_sensor:
  - platform: gpio
    id: binary_switch_all
    pin:
      number: GPIO8
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: decoration_lights
esphome:
  name: led-rgb-strip
  friendly_name: LED RGB Strip

bk72xx:
  board: wb3s
  framework: 
    version: latest

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

binary_sensor:
  - platform: gpio
    id: button
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - light.toggle: led_rgb_strip

output:
  - platform: libretiny_pwm
    id: red
    pin: GPIO9

  - platform: libretiny_pwm
    id: green
    pin: GPIO24

  - platform: libretiny_pwm
    id: blue
    pin: GPIO26

  - platform: libretiny_pwm
    id: cold_white
    pin: GPIO8

  - platform: libretiny_pwm
    id: warm_white
    pin: GPIO6

light:
  - platform: rgbww
    name: LED RGB Strip
    id: led_rgb_strip
    red: red
    green: green
    blue: blue
    cold_white: cold_white
    cold_white_color_temperature: 6500K
    warm_white: warm_white
    warm_white_color_temperature: 3000K
    gamma_correct: 0.9
    color_interlock: true
    default_transition_length: 0.45s
    restore_mode: RESTORE_DEFAULT_OFF
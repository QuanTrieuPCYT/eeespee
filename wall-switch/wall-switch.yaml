esphome:
  name: wall-switch
  friendly_name: Wall Switch

esp8266:
  board: esp01_1m
  restore_from_flash: true
  framework: 
    version: latest

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

udp:
  - port: !secret controller_port
    addresses:
      - !secret controller_ip

light:
  - platform: status_led
    name: LED Indicator
    pin:
      number: GPIO16
      inverted: true

switch:
  - platform: gpio
    name: Light Bulbs
    pin: GPIO13
    id: relay_1
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    name: LED Light
    pin: GPIO4
    id: relay_2
    restore_mode: RESTORE_DEFAULT_ON

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    id: button_1
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - switch.toggle: relay_1

      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - udp.write: "rgb"

      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - udp.write: "decorate"

      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - udp.write: "wol"

      - timing:
          - ON for at least 1.5s
        then:
          - udp.write: "climate"

  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    id: button_2
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - switch.toggle: relay_2

      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - udp.write: "desk"

      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.4s
        then:
          - udp.write: "alllights"

      - timing:
          - ON for at least 1.5s
        then:
          - udp.write: "fan"